<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Drip City Job Center</title>

    <link href="https://fonts.cdnfonts.com/css/echizen" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <canvas id="particles"></canvas>

    <div id="branding">Drip City Whitelist</div>

    <div id="container">
        <div class="header">
            <h1><i class="fas fa-building"></i> Employment Center</h1>
            <button id="closeBtn"><i class="fas fa-xmark"></i></button>
        </div>

        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search jobs...">
        </div>

        <div id="jobList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
